{% extends "base.html" %}
{% block title %}Packing List Generator{% endblock %}
{% block content %}
<div class="card card-soft p-4 p-md-5">
    <h1 class="mb-3">Packing List Generator</h1>
    <p class="text-muted mb-4">
        For each vehicle, upload 3 files together: passport, VIN sticker, export declaration.
    </p>

    <form id="mainForm" action="{{ url_for('generator') }}" method="post" enctype="multipart/form-data">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">Container Number</label>
                <input class="form-control" type="text" name="container_number" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Seal Number</label>
                <input class="form-control" type="text" name="seal_number" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Date (G4)</label>
                <input class="form-control" type="date" name="page_date" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Number of Vehicles</label>
                <select class="form-select" name="vehicle_count" id="vehicleCount" required>
                    <option value="">Select</option>
                    {% for i in range(1, 11) %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Country</label>
                <select class="form-select" name="country" id="countrySelect" required>
                    <option value="">Select country</option>
                    {% for country in country_options %}
                    <option value="{{ country }}">{{ country }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">City</label>
                <input class="form-control" type="text" name="city" required>
            </div>
        </div>

        <div class="row g-3 mt-2 d-none" id="otherCountryWrap">
            <div class="col-md-4">
                <label class="form-label">Other Country</label>
                <input class="form-control" type="text" name="other_country">
            </div>
        </div>

        <hr class="my-4">
        <div id="vehicleUploads"></div>

        <button class="btn btn-primary w-100 mt-3" type="submit">
            Generate Packing List
        </button>
    </form>
</div>

<script>
    const vehicleCount = document.getElementById('vehicleCount');
    const vehicleUploads = document.getElementById('vehicleUploads');
    const countrySelect = document.getElementById('countrySelect');
    const otherCountryWrap = document.getElementById('otherCountryWrap');

    function createVehicleCard(index) {

    const wrapper = document.createElement('div');

    wrapper.className = 'vehicle-card';

    wrapper.innerHTML = `
    <div class="fw-semibold mb-2">
        Vehicle #${index}
    </div>

    <input
        type="file"
        id="vehicle_files_${index}"
        name="vehicle_files_${index}"
        multiple
        hidden
        required
    >

    <div class="custom-file-wrap">
        <button type="button"
            class="btn btn-outline-primary"
            onclick="document.getElementById('vehicle_files_${index}').click()">
            Choose Files
        </button>

        <span id="vehicle_files_status_${index}">
            No files selected
        </span>
    </div>

    <!-- 🔥 여기 아래가 중요 -->
    <div class="mt-3 d-none" id="ocr_fields_${index}">

    <input
        class="form-control mb-2"
        name="vin_string_${index}"
        id="vin_string_${index}"
        placeholder="VIN"
    >

    <input
        class="form-control mb-2"
        name="passport_number_${index}"
        id="passport_number_${index}"
        placeholder="Passport Number"
    >

    <input
        class="form-control"
        name="full_name_${index}"
        id="full_name_${index}"
        placeholder="Full Name"
    >

    </div>
`;

    return wrapper;
}

function attachVehicleFileListeners(total) {

    for (let i = 1; i <= total; i++) {

        const input = document.getElementById(`vehicle_files_${i}`);
        const status = document.getElementById(`vehicle_files_status_${i}`);

        if (!input || !status) continue;

        input.addEventListener('change', async function () {

            const count = input.files.length;

            status.textContent =
                count === 0
                    ? 'No files selected'
                    : `Files selected: ${count}`;

            if (count > 0) {

                document
                    .getElementById(`ocr_fields_${i}`)
                    .classList
                    .remove('d-none');
            }

            // ==========================
            // VIN 자동 분석
            // ==========================

            let vinFile = null;

            for (const file of input.files) {

                const lower = file.name.toLowerCase();

                if (
                    lower.includes('vin') ||
                    lower.includes('sticker') ||
                    lower.includes('label')
                ) {
                    vinFile = file;
                    break;
                }
            }

            if (!vinFile) {
                console.log('VIN file not found');
                return;
            }

            status.textContent = 'Reading VIN...';

            try {

                const formData = new FormData();

                for (const file of input.files) {
                    formData.append('files', file);
                }

                const response = await fetch('/analyze-vin', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {

                    document.querySelector(
                        `input[name="vin_string_${i}"]`
                    ).value = data.vin_string || '';

                    status.textContent = 'VIN detected';

                } else {

                    status.textContent = 'VIN read failed';

                    console.error(data.error);
                }


// ==========================
// 🚀 MRZ (여권) 자동 분석
// ==========================

let passportFile = null;

for (const file of input.files) {

    const lower = file.name.toLowerCase();

    if (
        lower.includes('passport') ||
        lower.includes('mrz')
    ) {
        passportFile = file;
        break;
    }
}

if (passportFile) {

    status.textContent = 'Reading Passport...';

    try {

        const formData = new FormData();
        formData.append('files', passportFile);

        const response = await fetch('/analyze-passport', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.success) {

            const passportInput =
                document.getElementById(`passport_number_${i}`);

            const nameInput =
                document.getElementById(`full_name_${i}`);

            if (passportInput) {
                passportInput.value = data.passport_no || '';
            }

            if (nameInput) {
                nameInput.value =
                    (data.surname + ' ' + data.given_names).trim();
            }

            status.textContent = 'Passport detected';
        }

    } catch (err) {

        console.error(err);
        status.textContent = 'Passport failed';
    }
}
                
            } catch (err) {

                console.error(err);

                status.textContent = 'VIN read failed';
            }
        });
    }
}


    function renderVehicleFields(count) {
        vehicleUploads.innerHTML = '';
        const total = Number(count || 0);

        for (let i = 1; i <= total; i++) {
            vehicleUploads.appendChild(createVehicleCard(i));
        }

        attachVehicleFileListeners(total);
    }

    vehicleCount.addEventListener('change', function (e) {
        renderVehicleFields(e.target.value);
    });

    countrySelect.addEventListener('change', function (e) {
        otherCountryWrap.classList.toggle('d-none', e.target.value !== 'Other');
    });
</script>
{% endblock %}
