<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing List Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
        }

        .hero {
            max-width: 1040px;
            margin: 32px auto;
        }

        .card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .vehicle-card {
            background: #fff;
            border: 1px solid #edf0f5;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .form-control,
        .form-select {
            min-height: 58px;
            border-radius: 12px;
            font-size: 1rem;
        }

        input[type="date"].form-control {
            padding: 12px 16px;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.9;
        }

        button {
            border-radius: 12px !important;
            height: 58px;
            font-size: 16px;
        }

        .hint {
            font-size: 0.92rem;
            color: #6b7280;
            margin-top: 6px;
        }

        .example-box {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            color: #374151;
        }

        .custom-file-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .file-status {
            font-size: 15px;
            color: #374151;
        }

        .choose-btn {
            min-width: 170px;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .custom-file-wrap {
                flex-direction: column;
                align-items: stretch;
            }

            .choose-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container hero">
    <div class="card p-4 p-md-5">
        <h1 class="mb-3">Packing List Generator</h1>
        <p class="text-muted mb-4">
            For each vehicle, upload 3 files together in one file picker:
            passport, VIN sticker, and export declaration.
        </p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger">
            {% for message in messages %}
            <div>{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form id="mainForm" action="/generate" method="post" enctype="multipart/form-data">
            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Container Number</label>
                    <input class="form-control" type="text" name="container_number" placeholder="TGHU1234567" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Seal Number</label>
                    <input class="form-control" type="text" name="seal_number" placeholder="SEAL-98765" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Date</label>
                    <input class="form-control" type="date" name="page_date" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Number of Vehicles</label>
                    <select class="form-select" name="vehicle_count" id="vehicleCount" required>
                        <option value="">Select</option>
                        {% for i in range(1, 11) %}
                        <option value="{{ i }}">{{ i }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <select class="form-select" name="country" id="countrySelect" required>
                        <option value="">Select country</option>
                        {% for country in country_options %}
                        <option value="{{ country }}">{{ country }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">City</label>
                    <input class="form-control" type="text" name="city" placeholder="Bishkek" required>
                </div>
            </div>

            <div class="row g-3 mt-2 d-none" id="otherCountryWrap">
                <div class="col-md-4">
                    <label class="form-label">Other Country</label>
                    <input class="form-control" type="text" name="other_country" placeholder="Enter country name">
                </div>
            </div>

            <hr class="my-4">

            <div id="vehicleUploads"></div>


            <button class="btn btn-primary w-100 mt-3" type="submit">
                Generate Packing List
            </button>
        </form>
    </div>
</div>

<script>
    const vehicleCount = document.getElementById('vehicleCount');
    const vehicleUploads = document.getElementById('vehicleUploads');
    const countrySelect = document.getElementById('countrySelect');
    const otherCountryWrap = document.getElementById('otherCountryWrap');

    function createVehicleCard(index) {
        const wrapper = document.createElement('div');
        wrapper.className = 'vehicle-card';

        wrapper.innerHTML = `
            <div class="section-title">Vehicle #${index} (KG-${String(index).padStart(2, '0')})</div>

            <input
                type="file"
                id="vehicle_files_${index}"
                name="vehicle_files_${index}"
                multiple
                accept="image/*,.pdf"
                hidden
                required
            >

            <div class="custom-file-wrap">
                <button
                    type="button"
                    class="btn btn-outline-primary choose-btn"
                    onclick="document.getElementById('vehicle_files_${index}').click()"
                >
                    Choose Files
                </button>

                <span class="file-status" id="vehicle_files_status_${index}">
                    No files selected
                </span>
            </div>

            <div class="hint">
                Upload 3 files for this vehicle: passport, VIN sticker, export declaration.
            </div>
        `;

        return wrapper;
    }

    function attachVehicleFileListeners(total) {
        for (let i = 1; i <= total; i++) {
            const input = document.getElementById(`vehicle_files_${i}`);
            const status = document.getElementById(`vehicle_files_status_${i}`);

            if (!input || !status) continue;

            input.addEventListener('change', function () {
                const count = input.files.length;

                if (count === 0) {
                    status.textContent = 'No files selected';
                    return;
                }

                status.textContent = `Files: ${count}`;
            });
        }
    }

    function renderVehicleFields(count) {
        vehicleUploads.innerHTML = '';
        const total = Number(count || 0);

        for (let i = 1; i <= total; i++) {
            vehicleUploads.appendChild(createVehicleCard(i));
        }

        attachVehicleFileListeners(total);
    }

    vehicleCount.addEventListener('change', function (e) {
        renderVehicleFields(e.target.value);
    });

    countrySelect.addEventListener('change', function (e) {
        otherCountryWrap.classList.toggle('d-none', e.target.value !== 'Other');
    });
</script>
</body>
</html>
